name: CPP Linter
on: [pull_request]

permissions:
  pull-requests: write

jobs:
  cpp-linter:
    runs-on: ubuntu-22.04

    env:
      # Record pull request head commit SHA
      TB_PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Dependencies
      - name: Setup common prerequisites
        uses: ./.github/actions/setup-common

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install build-essential libxi-dev libxrandr-dev libxxf86vm-dev freeglut3-dev mesa-common-dev libgl1-mesa-dev libglu1-mesa-dev libglm-dev pandoc cmake p7zip-full ninja-build libglew-dev zlib1g-dev libfuse2

      - name: Run cmake
        run: |
          mkdir -p build
          cd build
          cmake .. -GNinja -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DTB_ENABLE_PCH=0

      - name: Run clang-tidy
        uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: 18
          style: 'file'  # Use .clang-format config file. 
          tidy-checks: '' # Use .clang-tidy config file.
          extensions: 'c,h,C,H,cpp,hpp,cc,hh,c++,h++,cxx,hxx,fragsh,vertsh'
          files-changed-only: true
          database: ${{github.workspace}}/build
          ignore: 'build|lib/TbUiLib/src/GetVersion.cpp'
          ignore-tidy: 'app/TrenchBroom/resources/shader'
          step-summary: true
          thread-comments: true
      - name: Fail fast?!
        if: steps.linter.outputs.checks-failed > 0
        run: exit 1
