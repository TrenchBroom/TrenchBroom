name: CI Windows
on:
  workflow_call:

permissions:
  packages: write
  contents: write
  actions: read

jobs:
  windows:
    runs-on: windows-2022
    env:
      TB_PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      TB_BUILD_TYPE: release
      TB_ARCH: x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup common prerequisites
        uses: ./.github/actions/setup-common

      - name: Setup shared CI environment
        uses: ./.github/actions/setup-shared-env

      - name: Install dependencies
        shell: pwsh
        run: |
          choco install ccache pandoc --yes --no-progress

          if (-not $env:ChocolateyInstall) {
            throw "ChocolateyInstall is not set"
          }
          "$env:ChocolateyInstall\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          Get-Command ccache -ErrorAction Stop | Out-Null
          Get-Command pandoc -ErrorAction Stop | Out-Null

      - name: Restore ccache
        uses: ./.github/actions/ccache-restore
        with:
          os: windows-2022
          build-type: ${{ env.TB_BUILD_TYPE }}
          arch: ${{ env.TB_ARCH }}

      - name: Initialize ccache
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "$env:CCACHE_DIR" -Force | Out-Null
          ccache --set-config=max_size=1G
          ccache --zero-stats

      - name: Build
        run: cmd.exe /c CI-windows.bat

      - name: ccache stats
        if: ${{ always() }}
        shell: pwsh
        run: ccache --show-stats

      - name: Save ccache
        if: ${{ success() && github.ref == 'refs/heads/master' }}
        uses: ./.github/actions/ccache-save
        with:
          os: windows-2022
          build-type: ${{ env.TB_BUILD_TYPE }}
          arch: ${{ env.TB_ARCH }}

      - name: Determine signing eligibility
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          # Only sign master/tag builds (not PRs) and only when the SignPath
          # secret is configured, e.g. on forks or before setup is complete.
          $isMasterOrTag = ($env:GITHUB_REF -eq 'refs/heads/master') -or ($env:GITHUB_REF -like 'refs/tags/*')
          $hasToken = -not [string]::IsNullOrEmpty($env:SIGNPATH_API_TOKEN)
          $shouldSign = $isMasterOrTag -and $hasToken
          "TB_SIGN_WINDOWS=$($shouldSign.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload unsigned artifact for signing
        id: upload-unsigned-artifact
        if: ${{ env.TB_SIGN_WINDOWS == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-2022-unsigned
          path: cmakebuild/*.zip
          retention-days: 1

      - name: Submit SignPath signing request
        if: ${{ env.TB_SIGN_WINDOWS == 'true' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: 'e1e71649-9b4d-4512-9772-e91002a78897'
          project-slug: 'TrenchBroom'
          # TODO: switch to a 'release-signing' policy/production certificate
          # once SignPath has issued one; for now everything uses the test cert.
          signing-policy-slug: 'test-signing'
          github-artifact-id: ${{ steps.upload-unsigned-artifact.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: cmakebuild/signed

      - name: Replace archive with signed version
        if: ${{ env.TB_SIGN_WINDOWS == 'true' }}
        shell: pwsh
        run: |
          Get-ChildItem cmakebuild\*.zip | Remove-Item -Force
          Get-ChildItem cmakebuild\*.zip.md5 -ErrorAction SilentlyContinue | Remove-Item -Force
          Move-Item cmakebuild\signed\*.zip cmakebuild\
          Push-Location cmakebuild
          cmd /c generate_checksum.bat
          Pop-Location

      - name: Upload artifacts
        uses: ./.github/actions/upload-artifacts
        with:
          name: windows-2022
          path: |
            cmakebuild/*.zip
            cmakebuild/*.zip.md5

      - name: Release
        uses: ./.github/actions/create-draft-release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          files: |
            cmakebuild/*.zip
            cmakebuild/*.zip.md5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
