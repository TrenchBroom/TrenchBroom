name: CI Windows
on:
  workflow_call:

permissions:
  packages: write
  contents: write

jobs:
  windows:
    runs-on: windows-2022
    env:
      TB_PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      TB_BUILD_TYPE: release
      TB_ARCH: x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup common prerequisites
        uses: ./.github/actions/setup-common

      - name: Setup shared CI environment
        uses: ./.github/actions/setup-shared-env

      - name: Install dependencies
        shell: pwsh
        run: |
          choco install ccache pandoc --yes --no-progress

          if (-not $env:ChocolateyInstall) {
            throw "ChocolateyInstall is not set"
          }
          "$env:ChocolateyInstall\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          Get-Command ccache -ErrorAction Stop | Out-Null
          Get-Command pandoc -ErrorAction Stop | Out-Null

      - name: Restore ccache
        uses: ./.github/actions/ccache-restore
        with:
          os: windows-2022
          build-type: ${{ env.TB_BUILD_TYPE }}
          arch: ${{ env.TB_ARCH }}

      - name: Initialize ccache
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "$env:CCACHE_DIR" -Force | Out-Null
          ccache --set-config=max_size=1G
          ccache --zero-stats

      - name: Build
        run: cmd.exe /c CI-windows.bat

      - name: ccache stats
        if: ${{ always() }}
        shell: pwsh
        run: ccache --show-stats

      - name: Save ccache
        if: ${{ success() && github.ref == 'refs/heads/master' }}
        uses: ./.github/actions/ccache-save
        with:
          os: windows-2022
          build-type: ${{ env.TB_BUILD_TYPE }}
          arch: ${{ env.TB_ARCH }}

      - name: Upload artifacts
        uses: ./.github/actions/upload-artifacts
        with:
          name: windows-2022
          path: |
            cmakebuild/*.zip
            cmakebuild/*.zip.md5

      - name: Release
        uses: ./.github/actions/create-draft-release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          files: |
            cmakebuild/*.zip
            cmakebuild/*.zip.md5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
