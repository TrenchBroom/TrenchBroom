name: Cleanup NuGet Package Versions

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Log package versions that would be deleted without deleting them.
        type: boolean
        default: true
      minimum-age-days:
        description: Only delete package versions older than this many days.
        type: number
        default: 14
      versions-to-keep:
        description: Always keep at least this many newest versions per package.
        type: number
        default: 5
  schedule:
    - cron: '0 3 * * 0'

permissions:
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}
  cancel-in-progress: false

jobs:
  delete-old-nuget-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old NuGet versions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PACKAGE_CLEANUP_TOKEN != '' && secrets.PACKAGE_CLEANUP_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const packageType = 'nuget';
            const dryRun = context.eventName === 'workflow_dispatch'
              ? Boolean(context.payload.inputs?.['dry-run'] === 'true' || context.payload.inputs?.['dry-run'] === true)
              : false;
            const minimumAgeDays = context.eventName === 'workflow_dispatch'
              ? Number(context.payload.inputs?.['minimum-age-days'] ?? 14)
              : 14;
            const versionsToKeep = context.eventName === 'workflow_dispatch'
              ? Number(context.payload.inputs?.['versions-to-keep'] ?? 5)
              : 5;
            const cutoffDate = new Date(Date.now() - minimumAgeDays * 24 * 60 * 60 * 1000);
            const packageNames = new Set();
            const vcpkgPackageNamePattern = /^[a-z0-9][a-z0-9.+-]*_(?:x64|x86|arm|arm64|arm64ec|wasm32|s390x|ppc64le|riscv32|loongarch32|mips64)(?:-[a-z0-9]+)+$/i;

            if (!Number.isFinite(minimumAgeDays) || minimumAgeDays < 1) {
              core.setFailed(`minimum-age-days must be at least 1, got: ${minimumAgeDays}`);
              return;
            }

            if (!Number.isFinite(versionsToKeep) || versionsToKeep < 1) {
              core.setFailed(`versions-to-keep must be at least 1, got: ${versionsToKeep}`);
              return;
            }

            core.info(`Cleanup policy: ${dryRun ? 'dry run, ' : ''}keep ${versionsToKeep} newest version(s) per package and every version created on or after ${cutoffDate.toISOString()}.`);

            async function listPackagesForType(packageType) {
              const orgPackages = await github.paginate('GET /orgs/{org}/packages', {
                org: owner,
                package_type: packageType,
                per_page: 100,
              });

              for (const pkg of orgPackages) {
                packageNames.add(pkg.name);
              }
              core.info(`Discovered ${orgPackages.length} package(s) from organization scope.`);
              if (orgPackages.length > 0) {
                const sample = orgPackages.slice(0, 10).map((pkg) => pkg.name).join(', ');
                core.info(`Sample discovered package names: ${sample}`);
              }
            }

            async function listPackageVersions(packageName) {
              return await github.paginate('GET /orgs/{org}/packages/{package_type}/{package_name}/versions', {
                org: owner,
                package_type: packageType,
                package_name: packageName,
                per_page: 100,
              });
            }

            async function deletePackageVersion(packageName, packageVersionId) {
              await github.request('DELETE /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}', {
                org: owner,
                package_type: packageType,
                package_name: packageName,
                package_version_id: packageVersionId,
              });
            }

            await listPackagesForType(packageType);

            const packages = [...packageNames].sort();
            const vcpkgPackages = packages.filter((packageName) => vcpkgPackageNamePattern.test(packageName));
            const skippedPackages = packages.length - vcpkgPackages.length;

            if (packages.length === 0) {
              core.setFailed('No NuGet packages found to process. If your packages are private, grant this repository access under Package Settings > Manage Actions Access, or set secret PACKAGE_CLEANUP_TOKEN with read:packages and delete:packages scopes (and repo scope for private repositories).');
              return;
            }

            if (vcpkgPackages.length === 0) {
              core.setFailed(`Found ${packages.length} NuGet package(s), but none matched the expected vcpkg binary cache package-name pattern.`);
              return;
            }

            core.info(`Found ${packages.length} NuGet package(s); processing ${vcpkgPackages.length} vcpkg-looking package(s) and skipping ${skippedPackages} package(s).`);

            let deletedCount = 0;

            for (const packageName of vcpkgPackages) {
              let versions = [];
              try {
                versions = await listPackageVersions(packageName);
              } catch (listError) {
                core.warning(`Skipping ${packageName}: unable to list versions: ${listError.message}`);
                continue;
              }
              const sortedVersions = [...versions].sort((left, right) => {
                return new Date(right.created_at).getTime() - new Date(left.created_at).getTime();
              });

              const protectedVersionIds = new Set(sortedVersions.slice(0, versionsToKeep).map((version) => version.id));
              const versionsToDelete = sortedVersions.filter((version) => {
                return !protectedVersionIds.has(version.id) && new Date(version.created_at) < cutoffDate;
              });
              const recentCount = sortedVersions.filter((version) => new Date(version.created_at) >= cutoffDate).length;
              core.info(`${packageName}: keeping ${Math.min(sortedVersions.length, versionsToKeep)} newest version(s), ${recentCount} recent version(s), and deleting ${versionsToDelete.length} of ${sortedVersions.length} version(s).`);

              for (const version of versionsToDelete) {
                if (dryRun) {
                  deletedCount += 1;
                  core.info(`Would delete ${packageName} version id ${version.id} created at ${version.created_at}.`);
                  continue;
                }

                try {
                  await deletePackageVersion(packageName, version.id);
                  deletedCount += 1;
                  core.info(`Deleted ${packageName} version id ${version.id} created at ${version.created_at}.`);
                } catch (deleteError) {
                  core.warning(`Failed to delete ${packageName} version id ${version.id}: ${deleteError.message}`);
                }
              }
            }

            core.info(`Finished cleanup. ${dryRun ? `Would delete ${deletedCount} NuGet package version(s).` : `Deleted ${deletedCount} NuGet package version(s).`}`);
