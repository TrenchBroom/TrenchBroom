name: Setup Shared CI Environment
description: Export shared environment variables used by platform CI workflows
runs:
  using: composite
  steps:
    - name: Export shared environment variables
      shell: bash
      run: |
        {
          echo "CCACHE_DIR=$GITHUB_WORKSPACE/.ccache"
          echo "CCACHE_CACHE_KEY_PREFIX=ccache-v1"
        } >> "$GITHUB_ENV"
