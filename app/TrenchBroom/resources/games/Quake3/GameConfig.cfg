{
    "version": 9,
    "name": "Quake 3",
    "icon": "Icon.png",
    "experimental": true,
    "fileformats": [
// brush primitives not yet implemented
//        { "format": "Quake3" },
        { "format": "Quake3 (Valve)" },
        { "format": "Quake3 (legacy)" }
    ],
    "filesystem": {
        "searchpath": "baseq3",
        "packageformat": { "extension": ".pk3", "format": "zip" }
    },
    "materials": {
        "root": "textures",
        "extensions": [ ".tga", ".png", ".jpg", ".jpeg" ],
        "shaderSearchPath": "scripts" // this will likely change when we get a material system
    },
    "entities": {
        "definitions": [ "entities.ent" ],
        "defaultcolor": "0.6 0.6 0.6 1.0",
        "scale": [ modelscale, modelscale_vec ] // this is an expression that is evaluated at runtime
    },
    "tags": {
        "brush": [
            {
                "name": "Trigger",
                "attribs": [ "transparent" ],
                "match": "classname",
                "pattern": "trigger_*",
                "material": "common/trigger"
            }
        ],
        "brushface": [
            {
                "name": "Clip",
                "attribs": [ "transparent" ],
                "match": "material",
                "pattern": "common/*clip"
            },
            {
                "name": "Caulk",
                "attribs": [ "transparent" ],
                "match": "material",
                "pattern": "common/*caulk"
            },
            {
                "name": "Hint",
                "attribs": [ "transparent" ],
                "match": "material",
                "pattern": "common/hint*"
            },
            {
                "name": "Detail",
                "match": "contentflag",
                "flags": [ "detail" ]
            },
            {
                "name": "Liquid",
                "match": "surfaceparm",
                "pattern": [ "water", "lava", "slime" ]
            },
            {
                "name": "Translucent",
                "attribs": [ "transparent" ],
                "match": "surfaceparm",
                "pattern": [ "trans", "fog" ]
            },
            {
                "name": "Areaportal",
                "attribs": [ "transparent" ],
                "match": "surfaceparm",
                "pattern": [ "areaportal" ]
            },
            {
                "name": "Clusterportal",
                "attribs": [ "transparent" ],
                "match": "surfaceparm",
                "pattern": [ "clusterportal" ]
            }
        ]
    },
    "faceattribs": {
        "defaults": {
            "scale": [0.5, 0.5]
        },
        "surfaceflags": [
            { "name": "nodamage", "description": "Never give falling damage" }, // 1 << 0
            { "name": "slick", "description": "Affects game physics; the surface is slippery" }, // 1 << 1
            { "name": "sky", "description": "The surface is sky; the texture is not drawn, the sky box is used instead" }, // 1 << 2
            { "name": "ladder", "description": "The surface is a climbable ladder" }, // 1 << 3
            { "name": "noimpact", "description": "Projectiles do not explode on this surface" }, // 1 << 4
            { "name": "nomarks", "description": "Projectiles do not leave marks on this surface" }, // 1 << 5
            { "name": "flesh", "description": "Make flesh sounds and effects" }, // 1 << 6
            { "name": "nodraw", "description": "Do not generate a drawsurface at all" }, // 1 << 7
            { "name": "hint", "description": "Make a primary bsp splitter" }, // 1 << 8
            { "name": "skip", "description": "Completely ignore, allowing non-closed brushes" }, // 1 << 9
            { "name": "nolightmap", "description": "The surface does not need a lightmap" }, // 1 << 10
            { "name": "pointlight", "description": "Generate lighting info at vertexes" }, // 1 << 11
            { "name": "metalsteps", "description": "Clanking footsteps" }, // 1 << 12
            { "name": "nosteps", "description": "No footstep sounds" }, // 1 << 13
            { "name": "nonsolid", "description": "Do not collide against curves with this set" }, // 1 << 14
            { "name": "lightfilter", "description": "Act as a light filter during q3map -light" }, // 1 << 15
            { "name": "alphashadow", "description": "Do per-pixel light shadow casting in q3map" }, // 1 << 16
            { "name": "nodlight", "description": "Do not receive dynamic lights even if solid (solid lava, skies)" }, // 1 << 17
            { "name": "dust", "description": "Leave a dust trail when walking on this surface" } // 1 << 18
        ],
        "contentflags": [
            { "name": "solid", "description": "Default for all brushes" }, // 1 << 0
            { "unused": true }, // 1 << 1
            { "unused": true }, // 1 << 2
            { "name": "lava", "description": "The brush is lava" }, // 1 << 3
            { "name": "slime", "description": "The brush is slime" }, // 1 << 4
            { "name": "water", "description": "The brush is water" }, // 1 << 5
            { "name": "fog", "description": "The brush is fog" }, // 1 << 6
            { "unused": true }, // 1 << 7
            { "unused": true }, // 1 << 8
            { "unused": true }, // 1 << 9
            { "unused": true }, // 1 << 10
            { "unused": true }, // 1 << 11
            { "unused": true }, // 1 << 12
            { "unused": true }, // 1 << 13
            { "unused": true }, // 1 << 14
            { "name": "areaportal", "description": "An area portal separating two areas" }, // 1 << 15
            { "name": "playerclip", "description": "Players cannot pass through the brush (other things can)" }, // 1 << 16
            { "name": "monsterclip", "description": "Bots and monsters cannot pass through the brush" }, // 1 << 17
            { "name": "teleporter", "description": "Bot navigation hint: teleporter" }, // 1 << 18
            { "name": "jumppad", "description": "Bot navigation hint: jump pad" }, // 1 << 19
            { "name": "clusterportal", "description": "Bot navigation hint: cluster portal" }, // 1 << 20
            { "name": "donotenter", "description": "Bot navigation hint: do not enter this area" }, // 1 << 21
            { "name": "botclip", "description": "Bots cannot pass through the brush" }, // 1 << 22
            { "unused": true }, // 1 << 23
            { "name": "origin", "description": "Specifies the origin of rotation for rotating brushes (removed before compilation)" }, // 1 << 24
            { "name": "body", "description": "Should never be on a brush, only in game" }, // 1 << 25
            { "name": "corpse", "description": "Corpse" }, // 1 << 26
            { "name": "detail", "description": "Detail brush (not used to build the bsp)" }, // 1 << 27
            { "name": "structural", "description": "Structural brush (used to build the bsp)" }, // 1 << 28
            { "name": "translucent", "description": "Do not consume surface fragments inside" }, // 1 << 29
            { "name": "trigger", "description": "Trigger brush" }, // 1 << 30
            { "name": "nodrop", "description": "Do not leave bodies or items (death fog, lava)" } // 1 << 31
        ]
    },
    "softMapBounds":"-65536 -65536 -65536 65536 65536 65536",
    "compilationTools": [
        { "name": "q3map2", "description": "Path to your q3map2 executable, which performs the main bsp/vis/light compilation phases" },
        { "name": "bspc", "description": "Path to your bspc or mbspc executable, which creates .aas files for bot support" }
    ]
}
