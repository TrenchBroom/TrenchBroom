{
    "version": 9,
    "name": "SoF",
    "icon": "Icon.png",
    "fileformats": [
        { "format": "Quake2" },
        { "format": "Quake2 (Valve)"}
    ],
    "filesystem": {
        "searchpath": "base",
        "packageformat": { "extension": ".pak", "format": "idpak" }
    },
    "materials": {
        "root": "textures",
        "extensions": [".m32"]
    },
    "entities": {
        "definitions": [ "sof.def" ],
        "defaultcolor": "0.6 0.6 0.6 1.0",
        "scale": [ scale ], // enable setup of scale keys in fgd entities to show model scaled in open map in TB. (Game dependant)
        "setDefaultProperties": false
    },
    "tags": {
        "brush": [
            {
                "name": "Areaportal",
                "attribs": [ "transparent" ],
                "match": "classname",
                "pattern": "*_areaportal",
                "material": "general/trigger" // set this texture when tag is enabled via KB shortcut
            },
            {
                "name": "Trigger",
                "attribs": [ "transparent" ],
                "match": "classname",
                "pattern": "trigger_*",
                "material": "general/trigger" // set this texture when tag is enabled via KB shortcut
            }
        ],
        "brushface": [
            {
                "name": "Clip",
                "attribs": [ "transparent" ],
                "match": "contentflag",
                "flags": [ "monsterclip", "playerclip" ]
            },
            {
                "name": "Detail",
                "match": "contentflag",
                "flags": [ "detail" ]
            },
            {
                "name": "Hint",
                "attribs": [ "transparent" ],
                "match": "surfaceflag",
                "flags": ["hint"]
            },
            {
                "name": "Ladder",
                "match": "contentflag",
                "flags": [ "ladder" ]
            },            
            {
                "name": "Liquid",
                "match": "contentflag",
                "flags": [ "lava", "slime", "water" ]
            },
            {
                "name": "Nodraw",
                "attribs": [ "transparent" ],
                "match": "surfaceflag",
                "flags": [ "nodraw" ]
            },
            {
                "name": "Origin",
                "attribs": [ "transparent" ],
                "match": "contentflag",
                "flags": [ "origin" ]
            },
            {
                "name": "Skip",
                "attribs": [ "transparent" ],
                "match": "surfaceflag",
                "flags": ["skip"]
            },
            {
                "name": "Sky",
                "attribs": [],
                "match": "surfaceflag",
                "flags": ["sky"]
            },
            {
                "name": "Slick",
                "attribs": [],
                "match": "surfaceflag",
                "flags": ["slick"]
            },
            {
                "name": "Transparent",
                "attribs": [ "transparent" ],
                "match": "surfaceflag",
                "flags": [ "trans33", "trans66" ]
            }
        ]
    },
    "faceattribs": {
        "defaults": {
            "scale": [1.0, 1.0]
        },
        "surfaceflags": [
            {
                "name": "light",
                "description": "Emit light from the surface, brightness is specified in the 'value' field"
            }, // 1
            {
                "name": "slick",
                "description": "The surface is slippery"
            }, // 2
            {
                "name": "sky",
                "description": "The surface is sky, the texture will not be drawn, but the background sky box is used instead"
            }, // 4
            {
                "name": "warp",
                "description": "The surface warps (like water textures do)"
            }, // 8
            {
                "name": "trans33",
                "description": "The surface is 33% transparent"
            }, // 16
            {
                "name": "trans66",
                "description": "The surface is 66% transparent"
            }, // 32
            {
                "name": "flowing",
                "description": "The texture wraps in a downward 'flowing' pattern towards angle 0(warp must also be set)"
            }, // 64
            {
                "name": "nodraw",
                "description": "Used for non-fixed-size brush triggers and clip brushes"
            }, // 128
            {
                "name": "hint",
                "description": "Make a primary bsp splitter"
            }, // 256
            {
                "name": "skip",
                "description": "Completely ignore, allowing non-closed brushes"
            }, // 512
            {
                "name": "no detail",
                "description": "Completely ignore, allowing non-closed brushes"
            }, // 1024
            {
                "name": "alpha tex",
                "description": ""
            }, // 2048
            {
                "name": "anim speed",
                "description": ""
            }, // 4096
            {
                "name": "undulate",
                "description": ""
            }, // 8192
            {
                "name": "sky reflect",
                "description": ""
            }, // 16384
            {
                "name": "map",
                "description": ""
            }, // 32768
            {
                "name": "region",
                "description": ""
            }, // 65536
            {
                "name": "simple spherical",
                "description": ""
            } // 131072
        ],
        "contentflags": [
            {
                "name": "solid",
                "description": "Default for all brushes"
            }, // 0 x1
            {
                "name": "window",
                "description": "Brush is a window"
            }, // 1 x2
            {
                "name": "push/pull",
                "description": "The brush can be pushed or pulled"
            }, // 2 x4 
            {
                "name": "lava",
                "description": "The brush is lava"
            }, // 3 x8
            {
                "name": "slime",
                "description": "The brush is slime"
            }, // 4 x16
            {
                "name": "water",
                "description": "The brush is water"
            }, // 5 x32
            {
                "name": "mist",
                "description": "A non-solid brush players can walk through."
            }, // 6 x64
            {
                "name": "shot",
                "description": ""
            }, // 7 x128
            {
                "name": "fog",
                "description": ""
            }, // 8 x256
            { "unused": true }, // 9   x512
            { "unused": true }, // 10  x1024
            { "unused": true }, // 11  x2048
            { "unused": true }, // 12  x4096
            { "unused": true }, // 13  x8192
            { "unused": true }, // 14  x16384
            { "unused": true }, // 15  x32768
            {
                "name": "playerclip",
                "description": "Player cannot pass through the brush (other things can)"
            }, // 16  x65536
            {
                "name": "monsterclip",
                "description": "Monster cannot pass through the brush (player and other things can)"
            }, // 17 x131072
            {
                "name": "current_0",
                "description": "Water current flows 0 degrees west"
            }, // 18 x262144
            {
                "name": "current_90",
                "description": "Water current flows 90 degrees north"
            }, // 19 x524288
            {
                "name": "current_180",
                "description": "Water current flows 180 degrees east"
            }, // 20 x1048576
            {
                "name": "current_270",
                "description": "Water current flows 270 degrees south"
            }, // 21 x2097152
            {
                "name": "current_up",
                "description": "Water current flows in the up direction"
            }, // 22 x4194304
            {
                "name": "current_dn",
                "description": "Water current flows in the down direction"
            }, // 23 x8388608
            {
                "name": "origin",
                "description": "Special brush used for specifying origin of rotation for rotating brushes"
            }, // 24 x16777216
            {
                "name": "monster",
                "description": "Purpose unknown"
            }, // 25 x33554432
            {
                "name": "corpse",
                "description": "Purpose unknown"
            }, // 26 x67108864
            {
                "name": "detail",
                "description": "Detail brush"
            }, // 27 x134217728
            {
                "name": "translucent",
                "description": "Use for opaque water that does not block vis"
            }, // 28 x268435456
            {
                "name": "ladder",
                "description": "Brushes with this flag allow a player to move up and down a vertical surface"
            }, // 29 x536870912
            {
                "name": "camnoblck",
                "description": "Brushes with this flag allow a player to move up and down a vertical surface"
            } // 30 x1073741824
        ]
    },
    "softMapBounds":"-16384 -16384 -16384 16384 16384 16384",
    "compilationTools": [
        { "name": "bsp", "description": "Path to your directory containing your bsp compiler. ${bsp}." },
        { "name": "vis", "description": "Path to your directory containing your vis compiler. ${vis}" },
        { "name": "light", "description": "Path to your directory containing your light compiler. ${light}"}
    ]
}