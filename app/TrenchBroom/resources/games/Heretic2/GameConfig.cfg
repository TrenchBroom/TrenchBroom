{
    "version": 9,
    "name": "Heretic 2",
    "icon": "Icon.png",
    "fileformats": [
        { "format": "Quake2" },
        { "format": "Quake2 (Valve)"}    
    ],
    "filesystem": {
        "searchpath": "base",
        "packageformat": { "extension": ".pak", "format": "idpak" }
    },
    "materials": {
        "root": "textures",
        "extensions": [".m8"]
    },
    "entities": {
        "definitions": [ "heretic2.fgd" ],
        "defaultcolor": "0.6 0.6 0.6 1.0",
        "scale": [ scale ], // enable setup of scale keys in fgd to show models scaled in TB.
        "setDefaultProperties": false
    },
    "tags": {
        "brush": [
            {
                "name": "Areaportal",
                "attribs": [ "transparent" ],
                "match": "classname",
                "pattern": "*_areaportal",
                "material": "general/trigger"
            },
            {
                "name": "Trigger",
                "attribs": [ "transparent" ],
                "match": "classname",
                "pattern": "trigger*",
                "material": "general/trigger"
            }
        ],
        "brushface": [
            {
                "name": "Clip",
                "attribs": [ "transparent" ],
                "match": "contentflag",
                "flags": ["playerclip","monsterclip"]
            },
            {
                "name": "Detail",
                "match": "contentflag",
                "flags": [ "detail" ]
            },
            {
                "name": "Hint",
                "attribs": [ "transparent" ],
                "match": "surfaceflag",
                "flags": ["hint"]
            },
            {
                "name": "Liquid",
                "match": "contentflag",
                "flags": [ "lava", "slime", "water" ]
            },
            {
                "name": "Nodraws",
                "attribs": [ "transparent" ],
                "match": "surfaceflag",
                "flags": [ "nodraw" ]
            },            
            {
                "name": "Origin",
                "attribs": [ "transparent" ],
                "match": "contentflag",
                "flags": [ "origin" ]
            },
            {
                "name": "Skip",
                "attribs": [ "transparent" ],
                "match": "surfaceflag",
                "flags": ["skip"]
            },
            {
                "name": "Sky",
                "attribs": [],
                "match": "surfaceflag",
                "flags": ["sky"]
            },            
            {
                "name": "Transparent",
                "attribs": [ "transparent" ],
                "match": "surfaceflag",
                "flags": [ "trans33", "trans66" ]
            }
        ]
    },
    "faceattribs": {
        "defaults": { "scale": [1.0, 1.0] },
        "surfaceflags": [
            {
                "name": "light",
                "description": "Emit light from the surface, brightness is specified in the 'value' field"
            }, // 1 << 0
            { "unused": true }, // 1 << 1 // SURF_SLICK (unused)
            {
                "name": "sky",
                "description": "The surface is sky, the texture will not be drawn, but the background sky box is used instead"
            }, // 1 << 2
            {
                "name": "warp",
                "description": "The surface warps (like water textures do)"
            }, // 1 << 3
            {
                "name": "trans33",
                "description": "The surface is 33% transparent"
            }, // 1 << 4
            {
                "name": "trans66",
                "description": "The surface is 66% transparent"
            }, // 1 << 5
            {
                "name": "flowing",
                "description": "The texture wraps in a downward 'flowing' pattern (warp must also be set)"
            }, // 1 << 6
            {
                "name": "nodraw",
                "description": "Used for non-fixed-size brush triggers and clip brushes"
            }, // 1 << 7
            {
                "name": "hint",
                "description": "Make a primary bsp splitter"
            }, // 1 << 8
            {
                "name": "skip",
                "description": "Completely ignore, allowing non-closed brushes"
            }, // 1 << 9
            {
                "name": "tall_wall",
                "description": "Face doesn't get broken up as normal and doesn't accept lightmaps"
            }, // 1 << 10
            { "unused": true }, // 1 << 11 // SURF_ALPHA_TEXTURE (unused)
            {
                "name": "animspeed",
                "description": "Value will hold the anim speed in fps"
            }, // 1 << 12
            {
                "name": "undulate",
                "description": "Set surface undulation on water"
            } // 1 << 13
        ],
        "contentflags": [
            {
                "name": "solid",
                "description": "Default for all brushes"
            }, // 1 << 0
            {
                "name": "window",
                "description": "Brush is a window"
            }, // 1 << 1
            {
                "name": "illusionary",
                "description": "The brush is non-solid, but blocks camera and crosshair"
            }, // 1 << 2
            {
                "name": "lava",
                "description": "The brush is lava"
            }, // 1 << 3
            {
                "name": "slime",
                "description": "The brush is slime"
            }, // 1 << 4
            {
                "name": "water",
                "description": "The brush is water"
            }, // 1 << 5
            {
                "name": "mist",
                "description": "The brush is non-solid"
            }, // 1 << 6
            { "unused": true }, // 1 << 7
            { "unused": true }, // 1 << 8
            { "unused": true }, // 1 << 9
            { "unused": true }, // 1 << 10
            { "unused": true }, // 1 << 11
            { "unused": true }, // 1 << 12
            { "unused": true }, // 1 << 13
            { "unused": true }, // 1 << 14
            {
                "name": "areaportal",
                "description": "Vis blocker that divides the map into areas for portal rendering optimization"
            }, // 1 << 15
            {
                "name": "playerclip",
                "description": "Player cannot pass through the brush (other things can)"
            }, // 1 << 16
            {
                "name": "monsterclip",
                "description": "Monster cannot pass through the brush (player and other things can)"
            }, // 1 << 17
            {
                "name": "current_0",
                "description": "Brush has a current in direction of 0 degrees"
            }, // 1 << 18
            {
                "name": "current_90",
                "description": "Brush has a current in direction of 90 degrees"
            }, // 1 << 19
            {
                "name": "current_180",
                "description": "Brush has a current in direction of 180 degrees"
            }, // 1 << 20
            {
                "name": "current_270",
                "description": "Brush has a current in direction of 270 degrees"
            }, // 1 << 21
            {
                "name": "current_up",
                "description": "Brush has a current in the up direction"
            }, // 1 << 22
            {
                "name": "current_down",
                "description": "Brush has a current in the down direction"
            }, // 1 << 23
            {
                "name": "origin",
                "description": "Special brush used for specifying origin of rotation for rotating brushes"
            }, // 1 << 24
            { "unused": true }, // 1 << 25 CONTENTS_MONSTER (unused) 
            { "unused": true }, // 1 << 26 CONTENTS_DEADMONSTER (unused) 
            {
                "name": "detail",
                "description": "Detail brush"
            }, // 1 << 27
            { "unused": true }, // 1 << 28 CONTENTS_TRANSLUCENT (unused)
            {
                "name": "camerablock",
                "description": "Brush blocks camera"
            }, // 1 << 29
            {
                "name": "camnoblock",
                "description": "Brush doesn't block camera"
            } // 1 << 30
        ]
    },
    "softMapBounds":"-4096 -4096 -4096 4096 4096 4096",
    "compilationTools": [
        { "name": "bsp", "description": "Path to your directory containing your bsp compiler. ${bsp}." },
        { "name": "vis", "description": "Path to your directory containing your vis compiler. ${vis}" },
        { "name": "light", "description": "Path to your directory containing your light compiler. ${light}" }
    ]
}
